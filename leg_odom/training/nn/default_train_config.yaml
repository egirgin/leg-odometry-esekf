# Neural contact training — hyperparameters. Run precompute_contact_instants with a YAML config first; training reads npz only (stance baked in).

dataset:
  kind: tartanground
  # Alternative: ocelot (lowstate.csv tree).
  # Tree of precomputed_instants.npz (precompute --config output_root); sequences discovered via rglob.
  precomputed_root: /home/girgine/Documents/leg-odometry/iros/async_ekf_workspace/leg_odom/features/precomputed_tartan_downtown

architecture: gru

# When output.dir is null or omitted, training uses leg_odom/training/nn/pretrained_{architecture}.
output:
  dir: leg_odom/training/nn/pretrained_gru_tartan_downtown

robot:
  kinematics: anymal
  # For ocelot example data, use go2.

features:
  fields:
    - p_foot_body_x
    - p_foot_body_y
    - p_foot_body_z
    - v_foot_body_x
    - v_foot_body_y
    - v_foot_body_z
    - est_tau_hip
    - est_tau_thigh
    - est_tau_calf
    - gyro_x
    - gyro_y
    - gyro_z
    - accel_x
    - accel_y
    - accel_z

training:
  epochs: 30
  batch_size: 30
  learning_rate: 1.0e-4
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15
  seed: 42
  num_workers: 0

model:
  window_size: 150

data_loading:
  verbose: true

visualization:
  enabled: true
  num_train_sections: 2
  num_test_sections: 2
  dpi: 150


