# Neural contact training — Ocelot + Go2 preset.
# Run precompute_contact_instants --config <yaml> first; training reads precomputed_instants.npz only.

dataset:
  kind: ocelot
  # Tree of precomputed_instants.npz (precompute output_root); sequences discovered via rglob.
  precomputed_root: /home/girgine/Documents/leg-odometry/iros/async_ekf_workspace/leg_odom/features/precomputed_ocelot

architecture: gru

# When output.dir is null or omitted, training uses leg_odom/training/nn/pretrained_{architecture}.
output:
  dir: null

robot:
  kinematics: go2

features:
  fields:
    - est_tau_calf
    - v_foot_body_x
    - v_foot_body_y
    - v_foot_body_z
    - p_foot_body_z

training:
  epochs: 10
  batch_size: 30
  learning_rate: 1.0e-4
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15
  seed: 42
  num_workers: 0

model:
  window_size: 150

data_loading:
  verbose: true

visualization:
  enabled: true
  num_train_sections: 2
  num_test_sections: 2
  dpi: 150
