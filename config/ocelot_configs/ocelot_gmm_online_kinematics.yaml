# GMM+HMM — online, kinematics. Pretrained: leg_odom/training/gmm/weights_kin.npz (GRF-only: ocelot_gmm_online_grf.yaml + weights_grf.npz).
# conda run -n leg-odometry python main.py --config config/ocelot_configs/ocelot_gmm_online.yaml

schema_version: 1

run:
  name: ocelot_gmm_online
  debug:
    enabled: true
    live_visualizer:
      enabled: true
      sliding_window_s: 10.0
      buffer_length: 5000
      hz: 10

robot:
  kinematics: go2

dataset:
  kind: ocelot
  sequence_dir: /home/girgine/Documents/leg-odometry/iros/data/14_43_46

contact:
  detector: gmm
  gmm:
    mode: online
    pretrained_path: /home/girgine/Documents/leg-odometry/iros/async_ekf_workspace/leg_odom/training/gmm/weights_kin.npz
    feature_fields:
      - est_tau_calf
      - v_foot_body_x
      - v_foot_body_y
      - v_foot_body_z
      - p_foot_body_z
    history_length: 1
    trans_stay: 0.99
    fit_interval: 250
    window_size: 500
    degeneracy_max_weight: 0.98
    random_state: 42

ekf:
  noise_config: config/ekf_noise/default.yaml
  initialize_nominal_from_data: false

output:
  base_dir: output_ocelot
  include_timestamp: true
